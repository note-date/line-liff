<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<script>
async function main() {

  await liff.init({
    liffId: "2009955434-vrii8s9X"
  });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  const url =
    "https://form.jotform.com/261066633327052?line_uid="
    + encodeURIComponent(profile.userId);

  alert(url);

  window.location.href = url;
}

main();
</script>

</body>
</html>
