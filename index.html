<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<script>
async function main() {

  await liff.init({
    liffId: "2009955434-vrii8s9X"
  });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();

  alert(profile.userId);

}
main();
</script>

</body>
</html>
